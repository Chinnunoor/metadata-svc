spring:
  application:
    name: continage

  datasource:
    url: jdbc:postgresql://localhost:5432/metadata_db
    username: metadata_user
    password: metadata_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true