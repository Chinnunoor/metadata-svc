name: Build and Push Spring Boot Docker Image to Nexus

on:
  
  push:
    branches:
      - main

  
  workflow_dispatch:

permissions:
  contents: read

env:
  # 8081 = Nexus website
  # 8083 = Nexus Docker registry
  NEXUS_REGISTRY: localhost:8083
  IMAGE_NAME: metadata-svc
  BASE_VERSION: 1.0.0-snapshot

jobs:
  build-and-push:
    name: Build JAR, Build Docker Image, Push to Nexus

    # Runs on your Mac(locally) 
    runs-on: self-hosted

    steps:
      
      - name: Checkout code
        uses: actions/checkout@v4

     
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      #  Build Spring Boot project and create JAR file
      - name: Build Maven project
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      #  Confirm JAR was created
      - name: Verify JAR file
        run: |
          echo "Created JAR files:"
          ls -lh target/*.jar

      # 5. Make a unique tag automatically for every workflow run
      - name: Generate Docker image tag
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="${BASE_VERSION}-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"

          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "Image tag created: $IMAGE_TAG"

      # 6. Log in to local Nexus using GitHub secrets
      - name: Login to Nexus Docker registry
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          echo "$NEXUS_PASSWORD" | docker login "$NEXUS_REGISTRY" \
            --username "$NEXUS_USERNAME" \
            --password-stdin

      # 7. Build Docker image using Dockerfile
      - name: Build Docker image
        run: |
          docker build \
            -t "$NEXUS_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" \
            .

      # 8. Confirm image was built locally
      - name: Verify Docker image
        run: |
          docker images "$NEXUS_REGISTRY/$IMAGE_NAME"

      # 9. Push image into docker-hosted repository in Nexus
      - name: Push Docker image to Nexus
        run: |
          docker push "$NEXUS_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"

      # 10. Show the final Nexus image address
      - name: Show pushed image
        run: |
          echo "Successfully pushed image:"
          echo "$NEXUS_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
