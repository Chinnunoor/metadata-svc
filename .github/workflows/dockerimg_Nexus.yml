name: Build and Push Spring Boot Docker Image to Nexus

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to push"
        required: true
        default: "1.0.0-snapshot"
        type: string

permissions:
  contents: read

env:
  # Nexus website = 8081
  # Nexus Docker registry = 8083
  NEXUS_REGISTRY: localhost:8083
  IMAGE_NAME: metadata-svc

jobs:
  build-and-push:
    name: Build JAR, Build Docker Image, Push to Nexus

    # Runs on your Mac self-hosted runner.
    # This is needed because Nexus is running locally on your Mac.
    runs-on: self-hosted

    steps:
      # 1. Download Spring Boot code from GitHub to your Mac runner
      - name: Checkout project code
        uses: actions/checkout@v4

      # 2. Install Java 21 for Maven
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # 3. Build the application and create the JAR file
      - name: Build Spring Boot JAR
        run: |
          if [ -f "./mvnw" ]; then
            chmod +x ./mvnw
            ./mvnw clean package -DskipTests
          else
            mvn clean package -DskipTests
          fi

      # 4. Confirm Maven created the JAR
      - name: Verify JAR file
        run: |
          echo "JAR file created:"
          ls -lh target/*.jar

      # 5. Log in to your local Nexus Docker registry
      - name: Login to Nexus
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          echo "$NEXUS_PASSWORD" | docker login "$NEXUS_REGISTRY" \
            --username "$NEXUS_USERNAME" \
            --password-stdin

      # 6. Use Dockerfile to create a Docker image
      - name: Build Docker image
        run: |
          docker build \
            -t "$NEXUS_REGISTRY/$IMAGE_NAME:${{ inputs.image_tag }}" \
            .

      # 7. Show the newly built image on your Mac
      - name: Verify Docker image
        run: |
          docker images "$NEXUS_REGISTRY/$IMAGE_NAME"

      # 8. Push Docker image into Nexus docker-hosted repository
      - name: Push Docker image to Nexus
        run: |
          docker push "$NEXUS_REGISTRY/$IMAGE_NAME:${{ inputs.image_tag }}"
