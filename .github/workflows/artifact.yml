name: Artifact workflow
on: 
  workflow_dispatch:
    inputs:
      java-version:
        description: enter java-version
        required: true
        type: string
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: code checking out
        uses: actions/checkout@v4
      - name: setting java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
      - name: maven 
        run: mvn clean package
      - name: Uploads the generated target folder as an artifact
        uses: actions/upload-artifact@v4
        with:
         name: maven-build
         path: target/
